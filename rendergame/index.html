<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renderização HTML</title>
    <style>
        body {
            overflow-y: scroll;
        }

        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>
<body>

<script>

	const googleSites = false;

    if (googleSites) {
      // Cria o input dinamicamente
      const input = document.createElement("input");
      input.type = "text";
      input.id = "urlInput";
      input.style.width = "80%";
      input.placeholder = "Cole aqui a URL completa do Google Sites";

      // Cria o botão
      const button = document.createElement("button");
      button.textContent = "Processar";
      button.id = "processButton";
      button.onclick = processUrl;

      // Adiciona tudo ao container
      let container = document.getElementById("container");
	  if (!container) {
	  	container = document.createElement("div");
	  	container.id = "container";
	  	document.body.appendChild(container);
	  }
      container.appendChild(input);
      container.appendChild(button);
    }

    function processUrl() {
      const urlText = document.getElementById("urlInput").value;

      try {
        const urlObj = new URL(urlText);
        const params = new URLSearchParams(urlObj.search);
        const gameLinkId = params.get("gamelinkid");

        if (gameLinkId) {
		  renderHtmlPage(gameLinkId);
        } else {
          console.error("Nenhum parâmetro gamelinkid encontrado na URL.");
        }
      } catch (e) {
        document.getElementById("output").textContent =
          "URL inválida. Verifique e tente novamente.";
      }

      // 🔥 Remove input e botão após executar
      const input = document.getElementById("urlInput");
      const button = document.getElementById("processButton");
      if (input) input.remove();
      if (button) button.remove();
    }

    // Obter a URL atual
    const urlParams = new URLSearchParams(window.location.search);

    // Resgatar o valor do parâmetro "gamelinkid"
    const idGame = urlParams.get('gamelinkid');
    alert(idGame);
            //const recentHtmlGame = selectGameIdByCreatedAt(data, idGame);
    console.log(idGame);
    if (idGame && typeof idGame === "string") {
	  renderHtmlPage(idGame);
	} else {
	  console.error("Parâmetro gamelinkid não encontrado ou inválido.");
	}
	
	// Função para selecionar o gameid com base no parâmetro created_at do gameid
function selectGameIdByCreatedAt(jsonData, createdAt) {
    let selectedGameId;
    jsonData.forEach(item => {
        if (item.created_at == createdAt) {
            selectedGameId = item;
            //console.log("teste");
        }
    });
    return selectedGameId;
}

    function renderHtmlPage(htmlContent) {
    const iframe = document.createElement('iframe');
    document.body.appendChild(iframe);

    // Substitui o marcador especial #ESPECIAL# por &&
    // Só aplica replace se houver marcador especial
    if (htmlContent.includes("#ESPECIAL#")) {
    	htmlContent = htmlContent.replace(/#ESPECIAL#/g, '&&');
  	}

    iframe.src = htmlContent;
    //console.log(iframe.contentDocument.documentElement.outerHTML);
    //iframe.contentDocument.close();

    // Lista de domínios bloqueados
    const blockedSites = ['bloqueado.com', 'malicioso.net', 'www.example.com'];

    // Aguarda o carregamento do conteúdo interno
    iframe.onload = () => {
        try {
            const innerIframes = iframe.contentDocument.querySelectorAll('iframe');
            innerIframes.forEach(innerIframe => {
                try {
                    const innerSrc = new URL(innerIframe.src).hostname;
                    if (blockedSites.includes(innerSrc)) {
                        console.warn(`⚠️ Removendo iframe interno de domínio bloqueado: ${innerSrc}`);
                        innerIframe.remove();
                    }
                } catch (e) {
                    console.error('❌ Erro ao verificar iframe interno:', e);
                }
            });
        } catch (e) {
            console.error('❌ Não foi possível acessar os iframes internos:', e);
        }
    };
}
    
</script>
</body>
</html>
